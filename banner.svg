<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated lychee-bot-acc banner</title>
<desc>A bobbing robot mascot with lychee fruit orbiting around it, beside the repo name.</desc>
<defs>
<linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#7cc96b"/>
<stop offset="1" stop-color="#4e9e42"/>
</linearGradient>
<g id="lychee">
<circle r="18" fill="#e3486b"/>
<circle r="18" fill="none" stroke="#a82347" stroke-width="0.5"/>
<g fill="#c93760"><circle cx="-7" cy="-5" r="2.3"/><circle cx="7" cy="-5" r="2.3"/><circle cx="0" cy="2" r="2.3"/><circle cx="-7" cy="7" r="2.3"/><circle cx="7" cy="7" r="2.3"/></g>
<path d="M0 -18 q8 -8 17 -5 q-4 9 -13 10 z" fill="url(#leaf2)"/>
</g>
</defs>

<g transform="translate(150,130)">
<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
<rect x="-70" y="-50" width="140" height="100" rx="20" fill="#f1d9b5"/>
<rect x="-70" y="-50" width="140" height="100" rx="20" fill="none" stroke="#c79a5e" stroke-width="0.5"/>
<rect x="-45" y="-22" width="40" height="30" rx="10" fill="#2d2440"/>
<rect x="5" y="-22" width="40" height="30" rx="10" fill="#2d2440"/>
<circle cx="-25" cy="-7" r="6" fill="#e3486b">
<animate attributeName="r" values="6;6;1.5;6" dur="3.5s" repeatCount="indefinite" keyTimes="0;0.05;0.1;1"/>
</circle>
<circle cx="25" cy="-7" r="6" fill="#7cc96b">
<animate attributeName="r" values="6;6;1.5;6" dur="3.5s" repeatCount="indefinite" keyTimes="0;0.05;0.1;1"/>
</circle>
<rect x="-20" y="22" width="40" height="6" rx="3" fill="#c79a5e"/>
<line x1="0" y1="-50" x2="0" y2="-68" stroke="#c79a5e" stroke-width="3" stroke-linecap="round"/>
<circle cx="0" cy="-72" r="6" fill="#e3486b">
<animate attributeName="cy" values="-72;-76;-72" dur="1.6s" repeatCount="indefinite"/>
</circle>
</g>

<g>
<animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
<use href="#lychee" transform="translate(110,0)"/>
<use href="#lychee" transform="translate(-110,0) scale(0.8)"/>
<use href="#lychee" transform="translate(0,110) scale(0.65)"/>
</g>
</g>

<text x="320" y="120" font-family="sans-serif" font-weight="500" font-size="22" fill="#e3486b">lychee-bot-acc</text>
<text x="320" y="148" font-family="sans-serif" font-size="12" fill="#9a7b4f">automated review bot</text>
<text x="320" y="168" font-family="sans-serif" font-size="12" fill="#9a7b4f">powered by tokens &amp; good vibes</text>
</svg>
